<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOLA DE FOGO ☄️🔥</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            background-color: #0d0d0d;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -4px;
            margin-bottom: 10px;
            text-transform: uppercase;
            background: linear-gradient(to right, #ff4500, #ff8c00, #ff4500);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 3s linear infinite;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        p {
            color: #888;
            font-size: 1.1rem;
            margin-bottom: 50px;
            max-width: 400px;
            line-height: 1.5;
        }

        /* Container do Botão Central */
        .button-container {
            position: relative;
            z-index: 5;
        }

        /* Estilo Base do Botão (Login/Frio) */
        .main-button {
            padding: 22px 60px;
            font-size: 1.6rem;
            font-weight: 900;
            color: #444; /* Texto escuro no modo frio */
            background-color: #1a1a1a; /* Fundo escuro no modo frio */
            border: 2px solid #333;
            border-radius: 60px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: -1px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .main-button:hover {
            border-color: #555;
            color: #888;
            transform: translateY(-2px);
        }

        /* Estilo quando o botão está QUENTE (Pronto para Lançar) */
        .main-button.hot {
            color: white;
            background: linear-gradient(45deg, #ff3d00, #ff1744);
            border: none;
            box-shadow: 0 0 30px rgba(255, 61, 0, 0.7);
            animation: pulseFire 2s infinite;
        }

        .main-button.hot:hover {
            box-shadow: 0 0 50px rgba(255, 61, 0, 1);
            transform: scale(1.03);
        }

        @keyframes pulseFire {
            0% { box-shadow: 0 0 30px rgba(255, 61, 0, 0.7); }
            50% { box-shadow: 0 0 60px rgba(255, 61, 0, 0.9); }
            100% { box-shadow: 0 0 30px rgba(255, 61, 0, 0.7); }
        }

        /* Elemento Visual da Bola de Fogo */
        .fireball-effect {
            position: absolute;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #fff3e0, #ffb74d, #ff5722, #d84315);
            border-radius: 50%;
            filter: blur(10px);
            display: none;
            z-index: -1;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <h1>BOLA DE FOGO</h1>
    <p>Cansada de tarefas atrasadas?<br>Limpe seu Asana e empurre tudo para amanhã em um clique.</p>

    <div class="button-container">
        <button id="action-btn" class="main-button" onclick="handleActionButton()">
            Aquecer (Conectar Asana)
        </button>
        <div id="fireball-effect" class="fireball-effect"></div>
    </div>

    <script>
        // CONFIGURAÇÕES DO ASANA (SaaS)
        const CLIENT_ID = 'SEU_CLIENT_ID_AQUI'; // <--- Cola seu Client ID aqui
        const REDIRECT_URI = window.location.origin + window.location.pathname; 

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const authCode = urlParams.get('code');
            const btn = document.getElementById('action-btn');

            if (authCode) {
                // ESTADO: LOGADO. Botão fica QUENTE.
                console.log("Bola de Fogo aquecida! Código: " + authCode);
                btn.innerText = "LANÇAR BOLA DE FOGO"; // Texto Direto
                btn.classList.add('hot'); // Visual Pulsante
                window.history.replaceState({}, document.title, REDIRECT_URI);
            }
        };

        function handleActionButton() {
            const btn = document.getElementById('action-btn');
            
            if (btn.classList.contains('hot')) {
                launchFireballEffect();
            } else {
                loginAsana();
            }
        }

        function loginAsana() {
            const authUrl = `https://app.asana.com/-/oauth_authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&state=boladefogo`;
            window.location.href = authUrl;
        }

        function launchFireballEffect() {
            const ball = document.getElementById('fireball-effect');
            const btn = document.getElementById('action-btn');
            
            btn.disabled = true;
            btn.innerText = "Lançando...";
            
            ball.style.display = 'block';
            ball.style.left = '50%';
            ball.style.top = '50%';
            ball.style.transform = 'translate(-50%, -50%) scale(1)';
            
            let scale = 1;
            let opacity = 0.8;
            const id = setInterval(frame, 10);
            function frame() {
                if (scale > 15 || opacity < 0.1) {
                    clearInterval(id);
                    ball.style.display = 'none';
                    btn.innerText = "Asana Limpo! 🔥";
                    btn.classList.remove('hot');
                    btn.style.backgroundColor = '#111';
                    
                    alert('Bola de Fogo lançada com sucesso! Suas tarefas pendentes foram reagendadas para amanhã.');
                    
                    setTimeout(()=> location.reload(), 3000);
                } else {
                    scale += 0.5;
                    opacity -= 0.02;
                    ball.style.transform = `translate(-50%, -50%) scale(${scale})`;
                    ball.style.opacity = opacity;
                }
            }
        }
    </script>
</body>
</html>
