<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOLA DE FOGO ☄️🔥</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #0d0d0d; color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        h1 { font-size: 3.5rem; font-weight: 900; background: linear-gradient(to right, #ff4500, #ff8c00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        p { color: #888; margin-bottom: 40px; max-width: 350px; }
        .main-button { padding: 22px 60px; font-size: 1.4rem; font-weight: 900; background: #1a1a1a; border: 2px solid #333; color: #444; border-radius: 60px; cursor: pointer; transition: 0.3s; }
        .main-button.hot { background: linear-gradient(45deg, #ff3d00, #ff1744); color: white; border: none; box-shadow: 0 0 30px rgba(255, 61, 0, 0.6); }
        .admin-link { margin-top: 50px; color: #222; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; }
        #secret-trigger { position: fixed; bottom: 15px; right: 15px; opacity: 0.2; cursor: help; font-size: 20px; }
    </style>
</head>
<body>

    <h1>BOLA DE FOGO</h1>
    <p id="desc">Limpe seu Asana e empurre tudo para amanhã em um clique.</p>

    <button id="btn" class="main-button" onclick="handleAction()">Aquecer (Conectar Asana)</button>

    <div class="admin-link" onclick="acessoGerencia()">Acesso Restrito</div>

    <div id="secret-trigger" onclick="ativarApocalipse()">⚡</div>

    <script>
        let modoApocalipse = false;
        const REDIRECT = window.location.origin + '/';

        window.onload = () => {
            const code = new URLSearchParams(window.location.search).get('code');
            if (code) { auth(code); window.history.replaceState({}, '', REDIRECT); }
            if (localStorage.getItem('asana_token')) setHot();
        };

        function setHot() {
            const b = document.getElementById('btn');
            b.innerText = "LANÇAR BOLA DE FOGO";
            b.classList.add('hot');
        }

        // Senha para ativar o modo 5 dias úteis
        function ativarApocalipse() {
            if (prompt("CÓDIGO SECRETO?") === "apocalipse5") {
                modoApocalipse = true;
                document.getElementById('btn').innerText = "MODO APOCALIPSE ☄️";
                document.getElementById('btn').style.background = "linear-gradient(45deg, #6a11cb, #2575fc)";
                alert("Modo Apocalipse Ativado! 5 dias de folga.");
            }
        }

        // Senha para entrar na página da equipe
        function acessoGerencia() {
            if (prompt("SENHA DE GERÊNCIA?") === "fogo123") {
                window.location.href = "gerencia.html"; 
            } else {
                alert("Acesso negado.");
            }
        }

        async function auth(code) {
            const r = await fetch('/api/burn', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ code }) 
            });
            const d = await r.json();
            if (d.token) { localStorage.setItem('asana_token', d.token); setHot(); }
        }

        async function handleAction() {
            const btn = document.getElementById('btn');
            if (!btn.classList.contains('hot')) {
                window.location.href = `https://app.asana.com/-/oauth_authorize?client_id=1213884306145874&redirect_uri=${encodeURIComponent(REDIRECT)}&response_type=code`;
            } else {
                btn.innerText = "LANÇANDO...";
                const api = modoApocalipse ? '/api/burn-apocalipse' : '/api/burn';
                await fetch(api, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ token: localStorage.getItem('asana_token') }) 
                });
                alert("Bola de Fogo lançada com sucesso! 🔥");
                location.reload();
            }
        }
    </script>
</body>
</html>
