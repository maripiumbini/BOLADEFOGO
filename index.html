<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOLA DE FOGO 🔥</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: -2px;
            margin-bottom: 10px;
            text-transform: uppercase;
            background: linear-gradient(to right, #ff4500, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #888;
            margin-bottom: 40px;
        }

        .fire-button {
            position: relative;
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(45deg, #ff4500, #ff0000);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.6);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .fire-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 69, 0, 0.9);
        }

        .fire-button:active {
            transform: scale(0.95);
        }

        /* Animação da Bola de Fogo */
        .fireball {
            position: absolute;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #ffca28, #ff7043, #d32f2f);
            border-radius: 50%;
            filter: blur(5px);
            display: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <h1>BOLA DE FOGO</h1>
    <p>Limpe seu Asana. Reagende tudo para amanhã em um clique.</p>

    <button class="fire-button" onclick="launchFireball()">Lançar Bola de Fogo</button>

    <div id="fireball" class="fireball"></div>

    <script>
        function launchFireball() {
            const ball = document.getElementById('fireball');
            ball.style.display = 'block';
            ball.style.left = '-100px';
            ball.style.top = '50%';
            
            // Animação simples atravessando a tela
            let pos = -100;
            const id = setInterval(frame, 5);
            function frame() {
                if (pos > window.innerWidth + 100) {
                    clearInterval(id);
                    ball.style.display = 'none';
                    alert('Asana limpo! 🔥 As tarefas foram empurradas para amanhã.');
                } else {
                    pos += 15;
                    ball.style.left = pos + 'px';
                    // Efeito de oscilação
                    ball.style.marginTop = Math.sin(pos / 50) * 20 + 'px';
                }
            }
        }
    </script>
</body>
</html>
