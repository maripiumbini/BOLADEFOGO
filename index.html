<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOLA DE FOGO ☄️🔥</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            background-color: #0d0d0d;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -4px;
            margin-bottom: 10px;
            text-transform: uppercase;
            background: linear-gradient(to right, #ff4500, #ff8c00, #ff4500);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 3s linear infinite;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        p {
            color: #888;
            font-size: 1.1rem;
            margin-bottom: 50px;
            max-width: 400px;
            line-height: 1.5;
        }

        .button-container {
            position: relative;
            z-index: 5;
        }

        .main-button {
            padding: 22px 60px;
            font-size: 1.6rem;
            font-weight: 900;
            color: #444;
            background-color: #1a1a1a;
            border: 2px solid #333;
            border-radius: 60px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: -1px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .main-button:hover {
            border-color: #555;
            color: #888;
            transform: translateY(-2px);
        }

        .main-button.hot {
            color: white;
            background: linear-gradient(45deg, #ff3d00, #ff1744);
            border: none;
            box-shadow: 0 0 30px rgba(255, 61, 0, 0.7);
            animation: pulseFire 2s infinite;
        }

        @keyframes pulseFire {
            0% { box-shadow: 0 0 30px rgba(255, 61, 0, 0.7); }
            50% { box-shadow: 0 0 60px rgba(255, 61, 0, 0.9); }
            100% { box-shadow: 0 0 30px rgba(255, 61, 0, 0.7); }
        }

        .fireball-effect {
            position: absolute;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #fff3e0, #ffb74d, #ff5722, #d84315);
            border-radius: 50%;
            filter: blur(10px);
            display: none;
            z-index: -1;
            opacity: 0.8;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .admin-link {
            margin-top: 40px;
            color: #222;
            text-decoration: none;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
        }
        .admin-link:hover { color: #444; }

        /* Ponto escondido do Modo Apocalipse */
        #secret-trigger {
            position: fixed;
            bottom: 10px;
            right: 10px;
            opacity: 0.05;
            cursor: help;
            font-size: 10px;
            color: #333;
        }
    </style>
</head>
<body>

    <h1>BOLA DE FOGO</h1>
    <p id="desc-p">Cansada de tarefas atrasadas?<br>Limpe seu Asana e empurre tudo para amanhã em um clique.</p>

    <div class="button-container">
        <button id="action-btn" class="main-button" onclick="handleActionButton()">
            Aquecer (Conectar Asana)
        </button>
        <div id="fireball-effect" class="fireball-effect"></div>
    </div>

    <div class="admin-link" onclick="acessoGerencia()">Acesso Restrito</div>
    
    <div id="secret-trigger" onclick="ativarModoApocalipse()">.</div>

    <script>
        const CLIENT_ID = '1213884306145874'; 
        const REDIRECT_URI = window.location.origin + '/'; 
        let isApocalypse = false;

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const authCode = urlParams.get('code');
            const btn = document.getElementById('action-btn');

            if (authCode) {
                btn.innerText = "LANÇAR BOLA DE FOGO"; 
                btn.classList.add('hot'); 
                prepararLancamento(authCode);
                window.history.replaceState({}, document.title, REDIRECT_URI);
            } else if (localStorage.getItem('asana_token')) {
                btn.innerText = "LANÇAR BOLA DE FOGO"; 
                btn.classList.add('hot');
            }
        };

        function ativarModoApocalipse() {
            const senha = prompt("CÓDIGO DE DESTRUIÇÃO:");
            if (senha === "apocalipse5") {
                isApocalypse = true;
                const btn = document.getElementById('action-btn');
                const desc = document.getElementById('desc-p');
                btn.innerText = "ATIVAR APOCALIPSE ☄️";
                btn.style.background = "linear-gradient(45deg, #6a11cb, #2575fc)";
                desc.innerHTML = "<b>MODO APOCALIPSE ATIVADO</b><br>Tudo será empurrado 5 dias úteis para frente.";
                alert("Modo Apocalipse pronto para lançamento. 🔥");
            }
        }

        async function prepararLancamento(authCode) {
            try {
                const resp = await fetch('/api/burn', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: authCode })
                });
                
                const data = await resp.json();
                
                if (data.token) {
                    localStorage.setItem('asana_token', data.token);
                    console.log("Token de gerência ativado! 🔥");
                } else {
                    alert("Erro ao obter token: " + (data.message || "Verifique os logs."));
                }
            } catch (error) {
                alert("Erro de conexão ao preparar: " + error.message);
            }
        }

        function acessoGerencia() {
            const senha = prompt("Digite a palavra-passe de gerência:");
            if (senha === "fogo123") {
                window.location.href = "gerencia.html";
            } else {
                alert("Acesso negado.");
            }
        }

        function handleActionButton() {
            const btn = document.getElementById('action-btn');
            if (btn.classList.contains('hot')) {
                launchFireballEffect();
                executarQueima();
            } else {
                const authUrl = `https://app.asana.com/-/oauth_authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&state=boladefogo`;
                window.location.href = authUrl;
            }
        }

        async function executarQueima() {
            const token = localStorage.getItem('asana_token');
            const apiPath = isApocalypse ? '/api/burn-apocalipse' : '/api/burn-equipe';
            const bodyData = isApocalypse ? { token } : { usuarios: ['me'], token };

            try {
                const resp = await fetch(apiPath, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });

                const resultado = await resp.json();

                if (resp.ok) {
                    // Feedback que você gosta de ter:
                    console.log(`Sucesso! ${resultado.reagendadas || 0} tarefas reagendadas.`);
                } else {
                    alert("Erro da API: " + (resultado.message || "Erro desconhecido"));
                }
            } catch (error) {
                alert("Erro de rede: " + error.message);
            }
        }

        function launchFireballEffect() {
            const ball = document.getElementById('fireball-effect');
            const btn = document.getElementById('action-btn');
            
            btn.disabled = true;
            btn.innerText = isApocalypse ? "EXTINGUINDO..." : "Lançando...";
            
            ball.style.display = 'block';
            let scale = 1;
            let opacity = 0.8;
            const id = setInterval(() => {
                if (scale > 15 || opacity < 0.1) {
                    clearInterval(id);
                    ball.style.display = 'none';
                    btn.innerText = "Asana Limpo! 🔥";
                    alert('Bola de Fogo lançada com sucesso!');
                    setTimeout(() => location.reload(), 1500);
                } else {
                    scale += 0.5;
                    opacity -= 0.02;
                    ball.style.transform = `translate(-50%, -50%) scale(${scale})`;
                    ball.style.opacity = opacity;
                }
            }, 15);
        }
    </script>
</body>
</html>
