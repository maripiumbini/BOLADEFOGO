<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTRAL DE COMANDO ⚖️🔥</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body { 
            background: #0d0d0d; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            text-align: center; 
            padding: 50px 20px;
            margin: 0;
        }

        h1 { 
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(to right, #4facfe, #00f2fe); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin-bottom: 10px;
        }

        p { color: #888; margin-bottom: 40px; }

        #lista-equipe {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .user-card { 
            display: flex; 
            align-items: center; 
            background: #1a1a1a; 
            padding: 15px; 
            border-radius: 16px; 
            border: 1px solid #333;
            width: 280px; 
            text-align: left; 
            cursor: pointer; 
            transition: all 0.3s ease;
            position: relative;
        }

        .user-card:hover { 
            border-color: #00f2fe; 
            background: #222;
            transform: translateY(-3px);
        }

        .user-card.selected {
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
            background: #1e2a2d;
        }

        .user-card img { 
            border-radius: 50%; 
            margin-right: 15px; 
            width: 50px; 
            height: 50px; 
            object-fit: cover;
            border: 2px solid #333;
        }

        .user-card input { 
            margin-right: 15px; 
            transform: scale(1.3); 
            cursor: pointer;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-name { font-weight: 700; font-size: 1rem; }
        .user-email { font-size: 0.75rem; color: #666; }

        .btn-panic { 
            background: linear-gradient(45deg, #ff4500, #ff8c00); 
            color: white; 
            padding: 20px 50px; 
            border: none; 
            border-radius: 60px; 
            font-weight: 900; 
            cursor: pointer; 
            margin-top: 50px; 
            font-size: 1.2rem;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(255, 69, 0, 0.3);
            transition: 0.3s;
        }

        .btn-panic:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 69, 0, 0.5);
        }

        .btn-panic:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: none;
        }

        .loader { color: #00f2fe; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>PAINEL DE GERÊNCIA</h1>
    <p>Selecione os colaboradores para empurrar as tarefas de hoje para amanhã.</p>

    <div id="lista-equipe">
        <div class="loader">Rastreando equipe no Asana...</div>
    </div>

    <button id="btn-main" class="btn-panic" onclick="lancarBolaDeFogoEquipe()">
        REAGENDAR SELECIONADOS 🔥
    </button>

    <script>
        const token = localStorage.getItem('asana_token'); 

        async function carregarEquipe() {
            if (!token) {
                alert("Você precisa 'Aquecer' o Asana na tela inicial primeiro!");
                window.location.href = '/';
                return;
            }

            try {
                const resp = await fetch('/api/equipe', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const equipe = await resp.json();
                
                const container = document.getElementById('lista-equipe');
                container.innerHTML = '';

                if (!equipe || equipe.length === 0) {
                    container.innerHTML = '<p>Nenhum colega de equipe encontrado.</p>';
                    return;
                }

                equipe.forEach(user => {
                    const fotoUrl = (user.photo && user.photo.image_60x60) 
                        ? user.photo.image_60x60 
                        : `https://ui-avatars.com/api/?name=${encodeURIComponent(user.name)}&background=random&color=fff&size=128`;

                    container.innerHTML += `
                        <div class="user-card" onclick="toggleSelection(this)">
                            <input type="checkbox" value="${user.gid}" class="user-check" onclick="event.stopPropagation(); updateCardStyle(this)">
                            <img src="${fotoUrl}" alt="${user.name}">
                            <div class="user-info">
                                <span class="user-name">${user.name}</span>
                                <span class="user-email">${user.email || 'Membro da Equipe'}</span>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error(error);
                alert("Erro ao carregar equipe. Verifique os logs na Vercel.");
            }
        }

        function toggleSelection(card) {
            const checkbox = card.querySelector('.user-check');
            checkbox.checked = !checkbox.checked;
            updateCardStyle(checkbox);
        }

        function updateCardStyle(checkbox) {
            if (checkbox.checked) {
                checkbox.parentElement.classList.add('selected');
            } else {
                checkbox.parentElement.classList.remove('selected');
            }
        }

        async function lancarBolaDeFogoEquipe() {
            const selecionados = Array.from(document.querySelectorAll('.user-check:checked')).map(cb => cb.value);
            if (selecionados.length === 0) return alert("Selecione pelo menos um colaborador!");

            const btn = document.getElementById('btn-main');
            const originalText = btn.innerText;
            btn.innerText = "LIMPANDO PAUTAS...";
            btn.disabled = true;

            try {
                const resp = await fetch('/api/burn-equipe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        usuarios: selecionados,
                        token: token 
                    })
                });

                const resultado = await resp.json();

                if (resp.ok) {
                    alert(`Missão cumprida! ${resultado.reagendadas || 0} tarefas reagendadas.`);
                    location.reload();
                } else {
                    // Aqui ele mostra o erro real vindo da API
                    alert("Erro da API: " + (resultado.message || resultado.error || "Erro desconhecido"));
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                alert("Erro de conexão: " + error.message);
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        window.onload = carregarEquipe;
    </script>
</body>
</html>
